# Template config, need to change dump_dir, data.root_dir and data.tokenizer.path

dump_dir: '/scratch/jeisner1/ssaigan1/lingua/dump_dir'
name: "debug"
steps: 100000
probe_freq: 100
seed: 777
optim:
    lr: 3e-4
    warmup: 2000
    lr_min_ratio: 0.000001
    clip: 10.0

distributed:
    fsdp_type: full_shard
    compile: false
    model_dtype: bf16
    matmul_allow_tf32: false
    selective_activation_checkpointing: false
    tp_size: 1

model:
    dim: 128
    n_layers: 8
    n_heads: 8

data:
    root_dir: '/scratch/jeisner1/ssaigan1/datasets'
    sources:
        TinyStories: 1.0
    batch_size: 256
    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: bytes
        path: '/scratch/jeisner1/ssaigan1/lingua/tokenizers'

profiling:
    run: true

checkpoint:
    dump:
        every: 100
        keep: 1
    eval:
        every: 100
        keep: 1

logging:
    freq: 10
    wandb:
        project: "lingua_runs"
        entity: "tilted-transformer"

eval:
    generator:
        max_tokens: 8192
        dtype: bf16
        temperature: 1.0
        top_p: 0.95
    harness:
        tasks:
            - hellaswag
            - piqa
            - task: nq_open
              num_fewshot: 5
    validation:
        max_steps: 100
