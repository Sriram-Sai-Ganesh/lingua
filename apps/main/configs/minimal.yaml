# Minimal config - trains LM and evaluates only on held-out validation data

name: "minimal"
steps: 1000
probe_freq: 100
seed: 41
optim:
    lr: 3e-2
    warmup: 200
    lr_min_ratio: 0.000001
    clip: 10.0

distributed:
    fsdp_type: full_shard
    compile: false
    model_dtype: bf16
    matmul_allow_tf32: false
    selective_activation_checkpointing: false
    tp_size: 1
    dp_shard: 2

model:
    dim: 128
    n_layers: 4
    n_heads: 4

data:
    root_dir: '/scratch/jeisner1/ssaigan1/datasets/wikitext'
    # root_dir: '/scratch/jeisner1/ssaigan1/datasets'
    sources:
        # TinyStories: 1.0
        wikitext-2-v1: 1.0
    batch_size: 512
    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: bytes
        path: '/scratch/jeisner1/ssaigan1/lingua/tokenizers'

profiling:
    run: true

checkpoint:
    dump:
        every: 100
        keep: 5
    eval:
        every: 100
        keep: 5

early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.01
    metric: "nll_per_token"  # metric to monitor from val results
    mode: "min"     # 'min' for loss-like metrics, 'max' for accuracy-like metrics

logging:
    freq: 1
    wandb:
        project: "lingua_runs"
        entity: "tilted-transformer"

eval:
    validation:
        max_steps: 100
